<!--
  INSTRUCTIONS
  ============
  1. In index.html, find the <form class="signup-form"> block and replace it with the form below.
  2. Replace the two placeholder values:
       YOUR_SUPABASE_URL  →  e.g. https://xyzabcdef.supabase.co
       YOUR_SUPABASE_ANON_KEY  →  your project's anon/public key
     Both are in: Supabase dashboard → Settings → API
  3. Add thanks.html to your repo root alongside index.html.
  4. Push to GitHub → Vercel auto-deploys.

  HOW TO VIEW SIGNUPS
  ===================
  Supabase dashboard → Table Editor → waitlist table
  Or: SQL Editor → run: select * from waitlist order by created_at desc;
  Or: export to CSV from the Table Editor toolbar.
-->

<!-- Replace your existing <form class="signup-form"> with this entire block -->
<form class="signup-form" id="waitlist-form">
  <input type="email" id="waitlist-email" placeholder="you@email.com" required autocomplete="email">
  <button type="submit" id="waitlist-btn">Notify me</button>
</form>
<p class="signup-note" id="signup-note">Android first. iOS coming soon.</p>

<script>
  const SUPABASE_URL = 'YOUR_SUPABASE_URL';
  const SUPABASE_ANON_KEY = 'YOUR_SUPABASE_ANON_KEY';

  document.getElementById('waitlist-form').addEventListener('submit', async function (e) {
    e.preventDefault();

    const email = document.getElementById('waitlist-email').value.trim();
    const btn = document.getElementById('waitlist-btn');
    const note = document.getElementById('signup-note');

    btn.disabled = true;
    btn.textContent = 'Saving...';

    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/waitlist`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`,
          'Prefer': 'return=minimal'
        },
        body: JSON.stringify({ email })
      });

      if (res.ok || res.status === 409) {
        // 409 = duplicate (already signed up) — treat as success either way
        window.location.href = '/thanks';
      } else {
        throw new Error('Request failed: ' + res.status);
      }
    } catch (err) {
      console.error(err);
      btn.disabled = false;
      btn.textContent = 'Notify me';
      note.textContent = 'Something went wrong — try again.';
      note.style.color = '#b5627a';
    }
  });
</script>

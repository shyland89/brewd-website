<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're on the list — Brewd</title>
  <meta name="description" content="Thanks for signing up. We'll let you know when Brewd launches.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0d0c;
      --surface: #161412;
      --rose: #b5627a;
      --rose-dim: rgba(181, 98, 122, 0.15);
      --text: #f0ebe4;
      --muted: #7a736b;
      --border: rgba(240, 235, 228, 0.07);
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      text-align: center;
    }

    /* Grain texture */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 100;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: 20%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(ellipse, rgba(181, 98, 122, 0.07) 0%, transparent 65%);
      pointer-events: none;
    }

    .wordmark {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--text);
      letter-spacing: -0.3px;
      margin-bottom: 64px;
      opacity: 0.6;
    }

    .icon {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--rose-dim);
      border: 1px solid rgba(181, 98, 122, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 32px;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 0 0 rgba(181, 98, 122, 0.2); }
      50% { box-shadow: 0 0 0 12px rgba(181, 98, 122, 0); }
    }

    .icon svg {
      width: 28px;
      height: 28px;
      stroke: var(--rose);
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    h1 {
      font-family: 'DM Serif Display', serif;
      font-size: clamp(36px, 8vw, 52px);
      line-height: 1.1;
      letter-spacing: -1px;
      color: var(--text);
      margin-bottom: 20px;
    }

    h1 em {
      font-style: italic;
      color: var(--rose);
    }

    .sub {
      font-size: 17px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 320px;
      margin: 0 auto 56px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: var(--border);
      margin: 0 auto 40px;
    }

    .note {
      font-size: 13px;
      color: var(--muted);
      letter-spacing: 0.02em;
      max-width: 280px;
      margin: 0 auto 48px;
      line-height: 1.6;
    }

    .back {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .back:hover {
      color: var(--text);
    }

    .back svg {
      width: 14px;
      height: 14px;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
  </style>
</head>
<body>

  <div class="wordmark">brewd</div>

  <div class="icon">
    <svg viewBox="0 0 24 24">
      <polyline points="20 6 9 17 4 12"></polyline>
    </svg>
  </div>

  <h1>You're on<br>the <em>list.</em></h1>

  <p class="sub">One email when we launch. That's it.</p>

  <div class="divider"></div>

  <p class="note">Android first. iOS coming shortly after. We'll reach out as soon as Brewd is live.</p>

  <a href="/" class="back">
    <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"></polyline></svg>
    Back to home
  </a>

</body>
</html>
